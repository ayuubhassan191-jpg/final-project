<main>

<section>

<h2>Book Your Table</h2>

<form action="#">

<fieldset>

<legend>Reservation Form</legend>

<label>Full Name</label><br>
<input type="text"
placeholder="Enter your name"
required
minlength="3"><br><br>

<label>Email</label><br>
<input type="email"
placeholder="example@gmail.com"
required><br><br>

<label>Password</label><br>
<input type="password"
placeholder="Password"
required
minlength="6"><br><br>

<label>Phone Number</label><br>
<input type="tel"
placeholder="613712018"
pattern="[0-9]{9,10}"
required><br><br>

<label>Select Food</label><br>

<select required>
<option>Pizza</option>
<option>bariis</option>
<option>canjeero</option>
<option>muufo</option>
</select>

<br><br>

<label>Gender</label><br>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<br><br>

<label>Extra Services</label><br>

<input type="checkbox"> Soft Drink

<input type="checkbox"> Dessert

<input type="checkbox"> Coffee

<br><br>

<label>Your Message</label><br>

<textarea rows="5" cols="40"
placeholder="Write your message"></textarea>

<br><br>

<input type="submit" value="Book Now">

</fieldset>

</form>

</section>



<section>

<h2>Our Location</h2>

src="https://www.google.com/maps/embed?pb="
width="600"
height="350"
style="border:0;"
allowfullscreen=""
loading="lazy">
</iframe>

</section>
